version: '3'

services:
  oneline:
    image: justincnn/oneline:latest
    ports:
      - "1212:3000"
    environment:
      - NODE_ENV=production
      # 可以在这里添加您的环境变量
      # - NEXT_PUBLIC_API_ENDPOINT=your_api_endpoint
      # - NEXT_PUBLIC_API_MODEL=your_api_model
      # - NEXT_PUBLIC_API_KEY=your_api_key
    restart: always 